<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TASKR — To-Do App · Karunendra</title>
<meta name="description" content="JavaScript Task 3 — Interactive To-Do List with CRUD, localStorage, and filtering.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================
   TASK 3 — JavaScript Logic & State Management
   Features:
   ✅ Full CRUD (Create, Read, Update, Delete)
   ✅ localStorage persistence
   ✅ Filter: All / Active / Completed
   ✅ Dynamic DOM + delegated event listeners
   ✅ Inline edit on double-click
   ✅ Drag to reorder
   ✅ Bulk actions (complete all, clear completed)
   ✅ Task counter + progress bar
   ✅ Priority tags (Low / Medium / High)
   ✅ Due date support
   ============================================ */

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:        #08080f;
  --bg2:       #0f0f1a;
  --surface:   #141420;
  --surface2:  #1c1c2e;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.13);
  --text:      #f0f0f5;
  --text2:     #9090a8;
  --muted:     #4a4a62;
  --accent:    #7c6dfa;
  --accent2:   #fa6d8f;
  --accent3:   #6dfac0;
  --yellow:    #fac96d;
  --red:       #fa5252;
  --green:     #51cf66;
  --font-d:    'Bebas Neue', sans-serif;
  --font-b:    'DM Sans', sans-serif;
  --font-m:    'JetBrains Mono', monospace;
  --ease:      cubic-bezier(0.16, 1, 0.3, 1);
  --r:         8px;
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--font-b);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

/* BG GRID */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(124,109,250,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,109,250,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* GLOW BLOB */
body::after {
  content: '';
  position: fixed; top: -20%; left: -10%; width: 60%; height: 60%;
  background: radial-gradient(ellipse, rgba(124,109,250,0.06) 0%, transparent 70%);
  z-index: 0; pointer-events: none;
}

/* ── LAYOUT ── */
.app {
  position: relative; z-index: 1;
  max-width: 680px; margin: 0 auto;
  padding: 3rem 1.5rem 6rem;
}

/* ── HEADER ── */
.app-header {
  margin-bottom: 2.5rem;
}
.app-brand {
  display: flex; align-items: baseline; gap: .6rem;
  margin-bottom: .25rem;
}
.app-logo {
  font-family: var(--font-d);
  font-size: 3.5rem; letter-spacing: .06em;
  color: var(--text); line-height: 1;
}
.app-logo span { color: var(--accent); }
.app-version {
  font-family: var(--font-m); font-size: .62rem;
  text-transform: uppercase; letter-spacing: .15em;
  color: var(--muted);
  border: 1px solid var(--border2);
  padding: 2px 8px; border-radius: 99px;
}
.app-sub {
  font-size: .85rem; color: var(--text2);
  font-family: var(--font-m);
}

/* ── STATS BAR ── */
.stats-bar {
  display: flex; gap: 1rem; flex-wrap: wrap;
  margin-bottom: 2rem;
}
.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r); padding: .85rem 1.1rem;
  flex: 1; min-width: 100px;
  position: relative; overflow: hidden;
  transition: border-color .2s;
}
.stat:hover { border-color: var(--border2); }
.stat-n {
  font-family: var(--font-d); font-size: 2rem; line-height: 1;
  color: var(--accent);
}
.stat-l {
  font-family: var(--font-m); font-size: .6rem;
  text-transform: uppercase; letter-spacing: .12em;
  color: var(--text2); margin-top: .15rem;
}
.stat.completed .stat-n { color: var(--accent3); }
.stat.active-s .stat-n { color: var(--yellow); }

/* ── PROGRESS ── */
.progress-wrap {
  margin-bottom: 2rem;
}
.progress-label {
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--font-m); font-size: .65rem;
  text-transform: uppercase; letter-spacing: .12em;
  color: var(--text2); margin-bottom: .5rem;
}
.progress-track {
  height: 3px; background: var(--border2); border-radius: 99px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  width: 0%; transition: width .6s var(--ease);
}

/* ── INPUT PANEL ── */
.input-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 1.25rem;
  margin-bottom: 1.5rem;
  transition: border-color .2s;
}
.input-panel:focus-within { border-color: rgba(124,109,250,.4); }

.input-row {
  display: flex; gap: .75rem; align-items: center;
  margin-bottom: .85rem;
}
.task-input {
  flex: 1; background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r); padding: .75rem 1rem;
  color: var(--text); font-family: var(--font-b);
  font-size: .97rem; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.task-input:focus {
  border-color: rgba(124,109,250,.5);
  box-shadow: 0 0 0 3px rgba(124,109,250,.08);
}
.task-input::placeholder { color: var(--muted); }

.btn-add {
  background: var(--accent); color: #fff;
  border: none; border-radius: var(--r);
  padding: .75rem 1.4rem; cursor: pointer;
  font-family: var(--font-m); font-size: .75rem;
  text-transform: uppercase; letter-spacing: .1em;
  font-weight: 500; white-space: nowrap;
  transition: background .2s, transform .15s, box-shadow .2s;
  display: flex; align-items: center; gap: .4rem;
}
.btn-add:hover {
  background: #6a5de0;
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(124,109,250,.3);
}
.btn-add:active { transform: translateY(0); }

/* Meta row */
.meta-row {
  display: flex; gap: .6rem; flex-wrap: wrap; align-items: center;
}
.select-field {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; padding: .4rem .7rem;
  color: var(--text2); font-family: var(--font-m);
  font-size: .7rem; outline: none; cursor: pointer;
  transition: border-color .2s;
}
.select-field:focus { border-color: rgba(124,109,250,.4); }
.date-input {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; padding: .4rem .7rem;
  color: var(--text2); font-family: var(--font-m);
  font-size: .7rem; outline: none;
  transition: border-color .2s;
  color-scheme: dark;
}
.date-input:focus { border-color: rgba(124,109,250,.4); }
.char-count {
  margin-left: auto; font-family: var(--font-m);
  font-size: .65rem; color: var(--muted);
}
.char-count.warn { color: var(--yellow); }
.char-count.over { color: var(--red); }

/* ── TOOLBAR ── */
.toolbar {
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: .75rem; margin-bottom: 1rem;
}

/* Filter tabs */
.filter-tabs {
  display: flex; gap: .3rem;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: .25rem;
}
.filter-btn {
  font-family: var(--font-m); font-size: .68rem;
  text-transform: uppercase; letter-spacing: .1em;
  padding: .35rem .85rem; border-radius: 5px;
  border: none; background: transparent;
  color: var(--text2); cursor: pointer;
  transition: background .2s, color .2s;
}
.filter-btn.active {
  background: var(--accent); color: #fff;
}
.filter-btn:hover:not(.active) { color: var(--text); }

/* Sort + Bulk */
.toolbar-right {
  display: flex; gap: .5rem; align-items: center;
}
.btn-sm {
  font-family: var(--font-m); font-size: .65rem;
  text-transform: uppercase; letter-spacing: .08em;
  padding: .38rem .8rem; border-radius: 6px;
  border: 1px solid var(--border2);
  background: transparent; color: var(--text2);
  cursor: pointer; transition: all .2s; white-space: nowrap;
}
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm.danger:hover { border-color: var(--red); color: var(--red); }

/* Search */
.search-wrap {
  position: relative; margin-bottom: 1rem;
}
.search-input {
  width: 100%; background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r); padding: .65rem 1rem .65rem 2.4rem;
  color: var(--text); font-family: var(--font-b);
  font-size: .9rem; outline: none;
  transition: border-color .2s;
}
.search-input:focus { border-color: rgba(124,109,250,.35); }
.search-input::placeholder { color: var(--muted); }
.search-icon {
  position: absolute; left: .85rem; top: 50%; transform: translateY(-50%);
  color: var(--muted); font-size: .9rem; pointer-events: none;
}

/* ── TASK LIST ── */
.task-list {
  display: flex; flex-direction: column; gap: .6rem;
  min-height: 60px;
}

/* EMPTY STATE */
.empty-state {
  text-align: center; padding: 3.5rem 1rem;
  display: none;
}
.empty-state.show { display: block; }
.empty-icon {
  font-size: 3rem; margin-bottom: 1rem;
  opacity: .4;
}
.empty-title {
  font-family: var(--font-d); font-size: 1.8rem;
  color: var(--text2); letter-spacing: .04em;
  margin-bottom: .4rem;
}
.empty-sub { font-size: .85rem; color: var(--muted); }

/* ── TASK ITEM ── */
.task-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r); padding: .9rem 1rem;
  display: flex; align-items: flex-start; gap: .85rem;
  position: relative; overflow: hidden;
  transition: border-color .25s, transform .25s var(--ease), box-shadow .25s, opacity .3s;
  animation: taskIn .3s var(--ease) both;
  cursor: default;
}
.task-item:hover { border-color: var(--border2); transform: translateX(2px); }
.task-item.completed { opacity: .55; }
.task-item.completed .task-text { text-decoration: line-through; color: var(--muted); }

/* priority left bar */
.task-item::before {
  content: ''; position: absolute;
  left: 0; top: 0; bottom: 0; width: 3px;
  border-radius: 3px 0 0 3px;
}
.task-item[data-priority="high"]::before   { background: var(--red); }
.task-item[data-priority="medium"]::before { background: var(--yellow); }
.task-item[data-priority="low"]::before    { background: var(--accent3); }

/* dragging state */
.task-item.dragging { opacity: .4; transform: scale(.98); }
.task-item.drag-over { border-color: rgba(124,109,250,.5); background: var(--surface2); }

/* CHECKBOX */
.task-check {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid var(--border2);
  flex-shrink: 0; cursor: pointer; margin-top: .1rem;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s, border-color .2s, transform .15s;
  background: transparent;
}
.task-check:hover { border-color: var(--accent); transform: scale(1.1); }
.task-item.completed .task-check {
  background: var(--accent3); border-color: var(--accent3);
}
.task-check-icon { display: none; font-size: .7rem; }
.task-item.completed .task-check-icon { display: block; }

/* TASK BODY */
.task-body { flex: 1; min-width: 0; }
.task-text {
  font-size: .97rem; color: var(--text);
  word-break: break-word; line-height: 1.5;
  transition: color .2s;
}
.task-meta {
  display: flex; flex-wrap: wrap; gap: .4rem;
  margin-top: .4rem; align-items: center;
}
.task-priority {
  font-family: var(--font-m); font-size: .58rem;
  text-transform: uppercase; letter-spacing: .1em;
  padding: 2px 7px; border-radius: 99px;
  border: 1px solid; font-weight: 500;
}
.pri-high   { color: var(--red);    border-color: rgba(250,82,82,.35);    background: rgba(250,82,82,.08); }
.pri-medium { color: var(--yellow); border-color: rgba(250,201,109,.35);  background: rgba(250,201,109,.08); }
.pri-low    { color: var(--accent3);border-color: rgba(109,250,192,.35); background: rgba(109,250,192,.08); }
.task-due {
  font-family: var(--font-m); font-size: .62rem;
  color: var(--text2); display: flex; align-items: center; gap: .25rem;
}
.task-due.overdue { color: var(--red); }
.task-created {
  font-family: var(--font-m); font-size: .58rem; color: var(--muted);
  margin-left: auto;
}

/* EDIT input */
.task-edit-input {
  width: 100%; background: var(--surface2);
  border: 1px solid rgba(124,109,250,.5);
  border-radius: 5px; padding: .35rem .6rem;
  color: var(--text); font-family: var(--font-b);
  font-size: .97rem; outline: none;
  box-shadow: 0 0 0 3px rgba(124,109,250,.08);
}

/* ACTIONS */
.task-actions {
  display: flex; gap: .3rem; flex-shrink: 0;
  opacity: 0; transition: opacity .2s;
}
.task-item:hover .task-actions { opacity: 1; }
.task-btn {
  width: 28px; height: 28px; border-radius: 6px;
  border: 1px solid var(--border2); background: var(--surface2);
  color: var(--text2); cursor: pointer; font-size: .8rem;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, border-color .15s, color .15s, transform .15s;
}
.task-btn:hover { transform: scale(1.1); }
.task-btn.edit:hover   { border-color: var(--accent); color: var(--accent); background: rgba(124,109,250,.1); }
.task-btn.delete:hover { border-color: var(--red);    color: var(--red);    background: rgba(250,82,82,.1); }

/* ── FOOTER BAR ── */
.footer-bar {
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: .5rem;
  padding-top: 1.2rem; margin-top: .5rem;
  border-top: 1px solid var(--border);
  font-family: var(--font-m); font-size: .68rem; color: var(--muted);
}

/* ── TOAST ── */
#toast-container {
  position: fixed; bottom: 2rem; right: 2rem;
  display: flex; flex-direction: column; gap: .5rem;
  z-index: 9999; pointer-events: none;
}
.toast {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--r); padding: .75rem 1.1rem;
  font-family: var(--font-m); font-size: .75rem; color: var(--text);
  display: flex; align-items: center; gap: .6rem;
  animation: toastIn .3s var(--ease) both;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
}
.toast.success { border-color: rgba(81,207,102,.35); }
.toast.error   { border-color: rgba(250,82,82,.35); }
.toast.info    { border-color: rgba(124,109,250,.35); }
.toast-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.toast.success .toast-dot { background: var(--green); }
.toast.error   .toast-dot { background: var(--red); }
.toast.info    .toast-dot { background: var(--accent); }

/* ── DRAG HANDLE ── */
.drag-handle {
  color: var(--muted); cursor: grab; font-size: .85rem;
  flex-shrink: 0; margin-top: .2rem; user-select: none;
  transition: color .2s;
}
.drag-handle:active { cursor: grabbing; }
.task-item:hover .drag-handle { color: var(--text2); }

/* ── KEYFRAMES ── */
@keyframes taskIn {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: none; }
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: none; }
}
@keyframes toastOut {
  from { opacity: 1; transform: none; }
  to   { opacity: 0; transform: translateX(20px); }
}
@keyframes taskDelete {
  from { opacity: 1; transform: none; max-height: 100px; }
  to   { opacity: 0; transform: translateX(20px); max-height: 0; padding: 0; margin: 0; border-width: 0; }
}

/* ── FOCUS ── */
:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 4px; }
a, button { cursor: pointer; }

/* ── RESPONSIVE ── */
@media (max-width: 520px) {
  .app { padding: 1.5rem 1rem 4rem; }
  .app-logo { font-size: 2.8rem; }
  .stats-bar { gap: .6rem; }
  .stat { padding: .65rem .8rem; }
  .toolbar { flex-direction: column; align-items: stretch; }
  .toolbar-right { justify-content: flex-end; }
  .task-actions { opacity: 1; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}
</style>
</head>
<body>

<div id="toast-container" aria-live="polite" aria-atomic="true"></div>

<div class="app">

  <!-- HEADER -->
  <header class="app-header">
    <div class="app-brand">
      <h1 class="app-logo">TASK<span>R</span></h1>
      <span class="app-version">v1.0</span>
    </div>
    <p class="app-sub">Task 3 &nbsp;·&nbsp; Karunendra &nbsp;·&nbsp; RGIPT IT'28</p>
  </header>

  <!-- STATS -->
  <div class="stats-bar" role="region" aria-label="Task statistics">
    <div class="stat">
      <div class="stat-n" id="stat-total">0</div>
      <div class="stat-l">Total</div>
    </div>
    <div class="stat active-s">
      <div class="stat-n" id="stat-active">0</div>
      <div class="stat-l">Active</div>
    </div>
    <div class="stat completed">
      <div class="stat-n" id="stat-done">0</div>
      <div class="stat-l">Done</div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap" role="region" aria-label="Completion progress">
    <div class="progress-label">
      <span>Progress</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Task completion progress">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <!-- INPUT PANEL -->
  <div class="input-panel" role="region" aria-label="Add new task">
    <div class="input-row">
      <input
        type="text" id="task-input" class="task-input"
        placeholder="What needs to be done?"
        maxlength="120"
        aria-label="New task title"
        autocomplete="off"
      >
      <button class="btn-add" id="btn-add" aria-label="Add task">
        <span aria-hidden="true">+</span> Add
      </button>
    </div>
    <div class="meta-row">
      <select id="priority-select" class="select-field" aria-label="Task priority">
        <option value="medium">⚡ Medium</option>
        <option value="high">🔴 High</option>
        <option value="low">🟢 Low</option>
      </select>
      <input type="date" id="due-date" class="date-input" aria-label="Due date">
      <span class="char-count" id="char-count" aria-live="polite">0 / 120</span>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="filter-tabs" role="group" aria-label="Filter tasks">
      <button class="filter-btn active" data-filter="all"       aria-pressed="true">All</button>
      <button class="filter-btn"        data-filter="active"    aria-pressed="false">Active</button>
      <button class="filter-btn"        data-filter="completed" aria-pressed="false">Done</button>
    </div>
    <div class="toolbar-right">
      <button class="btn-sm" id="btn-complete-all" title="Mark all complete">Complete All</button>
      <button class="btn-sm danger" id="btn-clear-done" title="Remove all completed">Clear Done</button>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <span class="search-icon" aria-hidden="true">🔍</span>
    <input
      type="search" id="search-input" class="search-input"
      placeholder="Search tasks…"
      aria-label="Search tasks"
      autocomplete="off"
    >
  </div>

  <!-- TASK LIST -->
  <main>
    <ul class="task-list" id="task-list" aria-label="Task list" role="list"></ul>
    <div class="empty-state" id="empty-state" role="status">
      <div class="empty-icon">📋</div>
      <div class="empty-title">All Clear!</div>
      <div class="empty-sub" id="empty-sub">Add a task above to get started.</div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer-bar" role="contentinfo">
    <span id="footer-count">0 tasks remaining</span>
    <span>Double-click to edit &nbsp;·&nbsp; Drag to reorder</span>
  </footer>

</div>

<script>
'use strict';

/* ============================================
   STATE
============================================ */
var STORAGE_KEY = 'taskr_karunendra_v1';

var state = {
  tasks:  [],
  filter: 'all',
  search: ''
};

function loadState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      var parsed = JSON.parse(raw);
      state.tasks = Array.isArray(parsed.tasks) ? parsed.tasks : [];
    }
  } catch(e) { state.tasks = []; }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ tasks: state.tasks }));
  } catch(e) { showToast('Storage error!', 'error'); }
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

/* ============================================
   DOM REFS
============================================ */
var taskInput     = document.getElementById('task-input');
var btnAdd        = document.getElementById('btn-add');
var prioritySel   = document.getElementById('priority-select');
var dueDateInput  = document.getElementById('due-date');
var charCount     = document.getElementById('char-count');
var taskList      = document.getElementById('task-list');
var emptyState    = document.getElementById('empty-state');
var emptySub      = document.getElementById('empty-sub');
var searchInput   = document.getElementById('search-input');
var filterBtns    = document.querySelectorAll('.filter-btn');
var btnCompleteAll= document.getElementById('btn-complete-all');
var btnClearDone  = document.getElementById('btn-clear-done');
var statTotal     = document.getElementById('stat-total');
var statActive    = document.getElementById('stat-active');
var statDone      = document.getElementById('stat-done');
var progressFill  = document.getElementById('progress-fill');
var progressPct   = document.getElementById('progress-pct');
var progressTrack = document.querySelector('.progress-track');
var footerCount   = document.getElementById('footer-count');

/* ============================================
   CRUD OPERATIONS
============================================ */

/* CREATE */
function createTask(text, priority, dueDate) {
  text = text.trim();
  if (!text) { showToast('Please enter a task!', 'error'); return; }
  if (text.length > 120) { showToast('Task too long (max 120 chars)', 'error'); return; }

  var task = {
    id:        genId(),
    text:      text,
    completed: false,
    priority:  priority || 'medium',
    dueDate:   dueDate || '',
    createdAt: new Date().toISOString()
  };

  state.tasks.unshift(task);
  saveState();
  render();
  showToast('Task added!', 'success');

  taskInput.value = '';
  dueDateInput.value = '';
  prioritySel.value = 'medium';
  updateCharCount();
  taskInput.focus();
}

/* READ — filter + search */
function getVisibleTasks() {
  return state.tasks.filter(function(t) {
    var matchFilter =
      state.filter === 'all' ||
      (state.filter === 'active'    && !t.completed) ||
      (state.filter === 'completed' &&  t.completed);
    var matchSearch = !state.search ||
      t.text.toLowerCase().includes(state.search.toLowerCase());
    return matchFilter && matchSearch;
  });
}

/* UPDATE — toggle complete */
function toggleTask(id) {
  var task = state.tasks.find(function(t) { return t.id === id; });
  if (!task) return;
  task.completed = !task.completed;
  saveState();
  render();
  showToast(task.completed ? 'Task completed! ✓' : 'Task reopened', task.completed ? 'success' : 'info');
}

/* UPDATE — edit text */
function updateTask(id, newText) {
  newText = newText.trim();
  if (!newText) { showToast('Task cannot be empty!', 'error'); return false; }
  var task = state.tasks.find(function(t) { return t.id === id; });
  if (!task) return false;
  task.text = newText;
  saveState();
  render();
  showToast('Task updated!', 'info');
  return true;
}

/* DELETE */
function deleteTask(id) {
  var li = taskList.querySelector('[data-id="' + id + '"]');
  if (li) {
    li.style.animation = 'taskDelete .3s var(--ease) forwards';
    setTimeout(function() {
      state.tasks = state.tasks.filter(function(t) { return t.id !== id; });
      saveState();
      render();
    }, 280);
  } else {
    state.tasks = state.tasks.filter(function(t) { return t.id !== id; });
    saveState();
    render();
  }
  showToast('Task deleted', 'error');
}

/* BULK — complete all visible */
function completeAll() {
  var visible = getVisibleTasks();
  if (!visible.length) { showToast('No tasks to complete!', 'error'); return; }
  var allDone = visible.every(function(t) { return t.completed; });
  visible.forEach(function(t) { t.completed = !allDone; });
  saveState();
  render();
  showToast(allDone ? 'All tasks reopened' : 'All tasks completed! ✓', 'success');
}

/* BULK — clear completed */
function clearCompleted() {
  var count = state.tasks.filter(function(t) { return t.completed; }).length;
  if (!count) { showToast('No completed tasks!', 'error'); return; }
  state.tasks = state.tasks.filter(function(t) { return !t.completed; });
  saveState();
  render();
  showToast(count + ' task' + (count > 1 ? 's' : '') + ' cleared', 'info');
}

/* ============================================
   RENDER
============================================ */
function render() {
  var visible = getVisibleTasks();

  /* update stats */
  var total   = state.tasks.length;
  var done    = state.tasks.filter(function(t) { return t.completed; }).length;
  var active  = total - done;
  var pct     = total ? Math.round(done / total * 100) : 0;

  statTotal.textContent  = total;
  statActive.textContent = active;
  statDone.textContent   = done;

  progressFill.style.width = pct + '%';
  progressPct.textContent  = pct + '%';
  progressTrack.setAttribute('aria-valuenow', pct);

  var remaining = state.tasks.filter(function(t) { return !t.completed; }).length;
  footerCount.textContent = remaining + ' task' + (remaining !== 1 ? 's' : '') + ' remaining';

  /* empty state */
  if (!visible.length) {
    taskList.innerHTML = '';
    emptyState.classList.add('show');
    if (state.search) {
      emptySub.textContent = 'No tasks match "' + state.search + '"';
    } else if (state.filter === 'active') {
      emptySub.textContent = 'No active tasks. Great work!';
    } else if (state.filter === 'completed') {
      emptySub.textContent = 'No completed tasks yet.';
    } else {
      emptySub.textContent = 'Add a task above to get started.';
    }
    return;
  }

  emptyState.classList.remove('show');

  /* build DOM — document fragment for performance */
  var frag = document.createDocumentFragment();
  visible.forEach(function(task) {
    frag.appendChild(buildTaskEl(task));
  });

  taskList.innerHTML = '';
  taskList.appendChild(frag);
}

function buildTaskEl(task) {
  var li = document.createElement('li');
  li.className = 'task-item' + (task.completed ? ' completed' : '');
  li.setAttribute('data-id', task.id);
  li.setAttribute('data-priority', task.priority);
  li.setAttribute('role', 'listitem');
  li.setAttribute('draggable', 'true');
  li.setAttribute('aria-label', 'Task: ' + task.text + (task.completed ? ' (completed)' : ''));

  /* due date status */
  var dueHtml = '';
  if (task.dueDate) {
    var now  = new Date(); now.setHours(0,0,0,0);
    var due  = new Date(task.dueDate + 'T00:00:00');
    var diff = Math.round((due - now) / 86400000);
    var cls  = (!task.completed && diff < 0) ? 'task-due overdue' : 'task-due';
    var label = diff < 0  ? '⚠ Overdue ' + Math.abs(diff) + 'd' :
                diff === 0 ? '📅 Today' :
                diff === 1 ? '📅 Tomorrow' :
                '📅 ' + due.toLocaleDateString('en-IN', { day:'numeric', month:'short' });
    dueHtml = '<span class="' + cls + '">' + label + '</span>';
  }

  var priClass = 'task-priority pri-' + task.priority;
  var priLabel = task.priority.charAt(0).toUpperCase() + task.priority.slice(1);

  var created = new Date(task.createdAt).toLocaleDateString('en-IN', { day:'numeric', month:'short' });

  li.innerHTML =
    '<span class="drag-handle" aria-hidden="true">⠿</span>' +
    '<button class="task-check" data-action="toggle" data-id="' + task.id + '" aria-label="' + (task.completed ? 'Mark incomplete' : 'Mark complete') + '">' +
      '<span class="task-check-icon" aria-hidden="true">✓</span>' +
    '</button>' +
    '<div class="task-body">' +
      '<div class="task-text">' + escapeHtml(task.text) + '</div>' +
      '<div class="task-meta">' +
        '<span class="' + priClass + '">' + priLabel + '</span>' +
        dueHtml +
        '<span class="task-created">' + created + '</span>' +
      '</div>' +
    '</div>' +
    '<div class="task-actions">' +
      '<button class="task-btn edit"   data-action="edit"   data-id="' + task.id + '" aria-label="Edit task" title="Edit (or double-click)">✎</button>' +
      '<button class="task-btn delete" data-action="delete" data-id="' + task.id + '" aria-label="Delete task" title="Delete">✕</button>' +
    '</div>';

  /* double-click to edit on text */
  li.querySelector('.task-text').addEventListener('dblclick', function() {
    startInlineEdit(li, task);
  });

  /* drag events */
  li.addEventListener('dragstart', onDragStart);
  li.addEventListener('dragover',  onDragOver);
  li.addEventListener('dragleave', onDragLeave);
  li.addEventListener('drop',      onDrop);
  li.addEventListener('dragend',   onDragEnd);

  return li;
}

/* ============================================
   INLINE EDIT
============================================ */
function startInlineEdit(li, task) {
  var textEl = li.querySelector('.task-text');
  var original = task.text;
  textEl.innerHTML = '';

  var input = document.createElement('input');
  input.type = 'text';
  input.className = 'task-edit-input';
  input.value = original;
  input.maxLength = 120;
  input.setAttribute('aria-label', 'Edit task text');
  textEl.appendChild(input);
  input.focus();
  input.select();

  function commit() {
    var val = input.value.trim();
    if (val && val !== original) {
      updateTask(task.id, val);
    } else {
      render(); /* restore */
    }
  }

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter')  { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { render(); }
  });
  input.addEventListener('blur', commit);
}

/* ============================================
   DELEGATED EVENT LISTENER on task list
============================================ */
taskList.addEventListener('click', function(e) {
  var btn = e.target.closest('[data-action]');
  if (!btn) return;
  var id     = btn.getAttribute('data-id');
  var action = btn.getAttribute('data-action');

  if (action === 'toggle') { toggleTask(id); }
  if (action === 'delete') { deleteTask(id); }
  if (action === 'edit') {
    var li   = btn.closest('.task-item');
    var task = state.tasks.find(function(t) { return t.id === id; });
    if (li && task) startInlineEdit(li, task);
  }
});

/* ============================================
   ADD TASK
============================================ */
btnAdd.addEventListener('click', function() {
  createTask(taskInput.value, prioritySel.value, dueDateInput.value);
});

taskInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') createTask(taskInput.value, prioritySel.value, dueDateInput.value);
});

/* Char count */
function updateCharCount() {
  var len = taskInput.value.length;
  charCount.textContent = len + ' / 120';
  charCount.className = 'char-count' + (len > 110 ? ' over' : len > 90 ? ' warn' : '');
}
taskInput.addEventListener('input', updateCharCount);

/* ============================================
   FILTER
============================================ */
filterBtns.forEach(function(btn) {
  btn.addEventListener('click', function() {
    state.filter = btn.getAttribute('data-filter');
    filterBtns.forEach(function(b) {
      b.classList.remove('active');
      b.setAttribute('aria-pressed', 'false');
    });
    btn.classList.add('active');
    btn.setAttribute('aria-pressed', 'true');
    render();
  });
});

/* ============================================
   SEARCH
============================================ */
searchInput.addEventListener('input', function() {
  state.search = searchInput.value;
  render();
});

/* ============================================
   BULK ACTIONS
============================================ */
btnCompleteAll.addEventListener('click', completeAll);
btnClearDone.addEventListener('click', clearCompleted);

/* ============================================
   DRAG & DROP REORDER
============================================ */
var dragSrcId = null;

function onDragStart(e) {
  dragSrcId = this.getAttribute('data-id');
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  this.classList.add('drag-over');
}
function onDragLeave() {
  this.classList.remove('drag-over');
}
function onDrop(e) {
  e.preventDefault();
  this.classList.remove('drag-over');
  var targetId = this.getAttribute('data-id');
  if (dragSrcId && targetId && dragSrcId !== targetId) {
    var srcIdx    = state.tasks.findIndex(function(t) { return t.id === dragSrcId; });
    var targetIdx = state.tasks.findIndex(function(t) { return t.id === targetId; });
    if (srcIdx > -1 && targetIdx > -1) {
      var removed = state.tasks.splice(srcIdx, 1)[0];
      state.tasks.splice(targetIdx, 0, removed);
      saveState();
      render();
    }
  }
}
function onDragEnd() {
  document.querySelectorAll('.task-item').forEach(function(el) {
    el.classList.remove('dragging', 'drag-over');
  });
  dragSrcId = null;
}

/* ============================================
   TOAST NOTIFICATIONS
============================================ */
var toastContainer = document.getElementById('toast-container');

function showToast(msg, type) {
  type = type || 'info';
  var toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.setAttribute('role', 'status');
  toast.innerHTML = '<span class="toast-dot"></span><span>' + escapeHtml(msg) + '</span>';
  toastContainer.appendChild(toast);
  setTimeout(function() {
    toast.style.animation = 'toastOut .3s var(--ease) forwards';
    setTimeout(function() { toast.remove(); }, 280);
  }, 2500);
}

/* ============================================
   HELPERS
============================================ */
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

/* ============================================
   INIT — seed demo tasks on first load
============================================ */
function init() {
  loadState();

  if (state.tasks.length === 0) {
    /* Seed 3 demo tasks */
    var today = new Date();
    var tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
    var fmt = function(d) { return d.toISOString().split('T')[0]; };

    state.tasks = [
      { id: genId(), text: 'Submit Task 1 — HTML5 Semantic Portfolio to GitHub', completed: true,  priority: 'high',   dueDate: fmt(today),    createdAt: new Date(Date.now()-86400000*2).toISOString() },
      { id: genId(), text: 'Submit Task 2 — Advanced CSS3 & Responsive Architecture', completed: true,  priority: 'high',   dueDate: fmt(today),    createdAt: new Date(Date.now()-86400000).toISOString() },
      { id: genId(), text: 'Submit Task 3 — JavaScript To-Do App (this one!)',  completed: false, priority: 'high',   dueDate: fmt(tomorrow), createdAt: new Date().toISOString() },
      { id: genId(), text: 'Task 4 — Async JS & RESTful APIs (Weather Dashboard)', completed: false, priority: 'medium', dueDate: '',            createdAt: new Date().toISOString() },
      { id: genId(), text: 'Task 5 — Full-Stack Deployment & Project Architecture', completed: false, priority: 'medium', dueDate: '',            createdAt: new Date().toISOString() },
    ];
    saveState();
  }

  render();
}

init();
</script>
